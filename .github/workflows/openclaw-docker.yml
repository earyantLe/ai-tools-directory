name: 🐳 OpenClaw Docker Runner (Optimized)

on:
  schedule:
    # 每天北京时间 10:00 执行
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  openclaw-docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        fetch-depth: 0
    
    - name: 🐳 Build OpenClaw Docker Image
      run: |
        echo "🔨 构建 OpenClaw 镜像..."
        docker build -t openclaw-runner:latest ./docker
        echo "✅ 镜像构建完成"
    
    - name: 🚀 Run OpenClaw Task
      run: |
        echo "🚀 在容器中执行 OpenClaw 任务..."
        
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -e FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }} \
          -e FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }} \
          -e GH_PAT=${{ secrets.GH_PAT }} \
          -e GITHUB_REPOSITORY=${{ github.repository }} \
          openclaw-runner:latest \
          sh -c "
          set -e
          
          echo '📂 设置工作区...'
          cd /workspace/ai-tools-directory
          
          echo '📊 当前工具数:' \$(node -e \"console.log(require('./data.json').tools.length)\")
          
          echo '🔍 执行数据更新...'
          node -e \"
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('./data.json', 'utf8'));
          
          // 这里添加实际的更新逻辑
          console.log('工具数:', data.tools.length);
          
          // 示例：验证数据
          const errors = [];
          data.tools.forEach((tool, i) => {
            if (!tool.name) errors.push('Tool ' + i + ': No name');
            if (!tool.url) errors.push('Tool ' + i + ': No URL');
          });
          
          if (errors.length > 0) {
            console.error('❌ 数据错误:', errors);
            process.exit(1);
          }
          
          console.log('✅ 数据验证通过');
          \"
          
          echo '✅ 任务完成'
          "
    
    - name: 📝 Commit and Push
      run: |
        cd ${{ github.workspace }}/ai-tools-directory
        
        git config user.name "OpenClaw Docker Bot"
        git config user.email "openclaw-docker@github.com"
        
        git add .
        git commit -m "chore: 自动验证数据 $(date '+%Y-%m-%d')" || echo "No changes"
        git push origin master
