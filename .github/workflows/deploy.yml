name: 🚀 Auto Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 🔍 Validate JSON
      run: |
        echo "Validating data.json..."
        node -e "JSON.parse(require('fs').readFileSync('data.json', 'utf8'))" && echo "✅ JSON valid" || echo "❌ JSON invalid"
    
    - name: 📊 Generate Stats
      run: |
        echo "=== AI Tools Statistics ==="
        node -e "
        const data = require('./data.json');
        console.log('Total tools:', data.tools.length);
        const byCategory = data.tools.reduce((acc, tool) => {
          acc[tool.category] = (acc[tool.category] || 0) + 1;
          return acc;
        }, {});
        console.log('By category:');
        Object.entries(byCategory).forEach(([cat, count]) => {
          console.log('  -', cat + ':', count);
        });
        "
    
    - name: 🌐 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
    
    - name: ✅ Deployment Complete
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 Site: https://earyantle.github.io/ai-tools-directory/"
