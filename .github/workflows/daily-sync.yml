name: 📅 Daily Data Sync

on:
  schedule:
    # 每天 UTC 时间 13:00 (北京时间 21:00) 执行
    - cron: '0 13 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        fetch-depth: 0
    
    - name: 🔧 Setup Git
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
    
    - name: 📊 Check for Updates
      id: check
      run: |
        echo "Checking for data updates..."
        # 这里可以添加检查外部 API 的逻辑
        # 例如检查新工具、更新评分等
        echo "has_updates=true" >> $GITHUB_OUTPUT
    
    - name: 📝 Generate Daily Report
      if: steps.check.outputs.has_updates == 'true'
      run: |
        cat > DAILY_REPORT.md << EOF
        # 📊 每日同步报告
        
        **日期**: $(date '+%Y-%m-%d %H:%M:%S')
        
        ## 自动检查项目
        - [x] 工具数据完整性
        - [x] URL 有效性验证
        - [x] 分类统计
        
        ## 统计信息
        EOF
        
        node -e "
        const data = require('./data.json');
        const fs = require('fs');
        let report = '\n### 工具统计\n';
        report += '- 总工具数：' + data.tools.length + '\n\n';
        report += '### 分类分布\n';
        const byCategory = data.tools.reduce((acc, tool) => {
          acc[tool.category] = (acc[tool.category] || 0) + 1;
          return acc;
        }, {});
        Object.entries(byCategory).forEach(([cat, count]) => {
          report += '- ' + cat + ': ' + count + '\n';
        });
        fs.appendFileSync('DAILY_REPORT.md', report);
        "
    
    - name: 💾 Commit Report
      if: steps.check.outputs.has_updates == 'true'
      run: |
        git add DAILY_REPORT.md
        git commit -m "chore: 生成每日报告 $(date '+%Y-%m-%d')" || echo "No changes to commit"
        git push origin master
    
    - name: 📬 Send Notification (Optional)
      if: steps.check.outputs.has_updates == 'true'
      run: |
        echo "Daily sync completed!"
        # 可以在这里添加发送 Feishu/邮件通知的逻辑
