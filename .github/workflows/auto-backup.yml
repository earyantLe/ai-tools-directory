name: 🔄 Auto Backup

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间 08:00) 执行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📦 Create Backup
      run: |
        # 创建备份分支
        git checkout -b backup/$(date '+%Y-%m-%d')
        
        # 生成备份信息
        cat > BACKUP_INFO.md << EOF
        # 📦 自动备份
        
        **备份时间**: $(date '+%Y-%m-%d %H:%M:%S')
        **分支**: backup/$(date '+%Y-%m-%d')
        **提交数**: $(git rev-list --count HEAD)
        **最新提交**: $(git log -1 --format="%h %s")
        
        ## 文件统计
        EOF
        
        echo "- 总文件数：$(find . -type f | wc -l)" >> BACKUP_INFO.md
        echo "- 工具数据：$(node -e "console.log(require('./data.json').tools.length)")" >> BACKUP_INFO.md
        
        git add BACKUP_INFO.md
        git commit -m "chore: 自动备份 $(date '+%Y-%m-%d')"
        
        # 推送到备份分支
        git push -u origin backup/$(date '+%Y-%m-%d') || echo "Backup branch already exists"
    
    - name: 🗑️ Cleanup Old Backups
      run: |
        # 保留最近 7 个备份分支
        git branch -r | grep 'origin/backup/' | sort | head -n -7 | xargs -I {} git push origin --delete {} 2>/dev/null || true
