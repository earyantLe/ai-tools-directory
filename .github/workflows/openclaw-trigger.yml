name: 🤖 Trigger OpenClaw

on:
  schedule:
    # 每天北京时间 10:00 执行（可以修改）
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        fetch-depth: 0
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 📊 Fetch AI Tools Data
      run: |
        echo "🔍 开始搜索 AI 工具..."
        
        # 创建数据更新脚本
        cat > update-tools.js << 'EOF'
        const https = require('https');
        const fs = require('fs');
        
        // 读取现有数据
        const dataPath = './data.json';
        let data = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
        
        // 模拟新工具数据（实际应该调用 API 或爬虫）
        const newTools = [
          {
            id: data.tools.length + 1,
            name: "New AI Tool",
            nameEn: "New AI Tool",
            description: "这是一个新发现的 AI 工具",
            category: "AI Agent",
            pricing: "免费 + 付费",
            url: "https://example.com",
            tags: ["AI", "Productivity"],
            rating: 4.5,
            favorites: 0,
            logo: "🤖",
            features: ["Feature 1", "Feature 2"]
          }
        ];
        
        // 添加新工具
        data.tools.push(...newTools);
        
        // 写回文件
        fs.writeFileSync(dataPath, JSON.stringify(data, null, 2));
        
        console.log(`✅ 添加了 ${newTools.length} 个新工具`);
        console.log(`📊 当前总工具数：${data.tools.length}`);
        EOF
        
        node update-tools.js
    
    - name: 📝 Commit and Push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        
        git add data.json
        git commit -m "feat: 自动更新 AI 工具数据 $(date '+%Y-%m-%d')" || echo "No changes to commit"
        git push origin master
    
    - name: 📬 Notify Completion
      run: |
        echo "✅ OpenClaw 自动化任务完成！"
        echo "🌐 查看网站：https://earyantle.github.io/ai-tools-directory/"
