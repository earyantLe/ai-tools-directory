<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 工具导航 - 收录 60+ AI 工具，覆盖基础大模型、大模型产品、AI Agent、开发框架、多模态创作等完整生态链">
    <meta name="keywords" content="AI 工具，大模型，LLM,AI Agent，开发框架，工具导航">
    <title>AI 工具导航 - 大模型生态全景图</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <h1>🧠 AI 工具导航</h1>
                    <p class="subtitle" id="siteSubtitle">收录 60+ AI 工具，覆盖从基础模型到应用开发的完整生态链</p>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
                    <button id="favoritesBtn" class="favorites-btn" title="我的收藏">⭐ 收藏</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalTools">0</span>
                <span class="stat-label">总工具</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="favoritedTools">0</span>
                <span class="stat-label">已收藏</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="displayedTools">0</span>
                <span class="stat-label">显示中</span>
            </div>
        </div>

        <!-- 搜索和筛选区 -->
        <div class="filters-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索工具名称、描述或标签...">
                <button id="clearSearch" class="clear-btn" style="display: none;">✕</button>
            </div>
            
            <div class="filter-controls">
                <div class="filter-group">
                    <label for="categoryFilter">分类</label>
                    <select id="categoryFilter">
                        <option value="全部">全部分类</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="pricingFilter">价格</label>
                    <select id="pricingFilter">
                        <option value="全部">全部价格</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="sortSelect">排序</label>
                    <select id="sortSelect">
                        <option value="favorites">热门度</option>
                        <option value="rating">评分</option>
                        <option value="name">名称</option>
                        <option value="newest">最新添加</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 标签云 -->
        <div class="tags-cloud" id="tagsCloud">
            <span class="tags-label">热门标签：</span>
        </div>

        <!-- 工具网格 -->
        <div id="toolsGrid" class="tools-grid">
            <!-- 工具卡片将通过 JS 动态加载 -->
        </div>

        <!-- 加载更多 -->
        <div class="load-more-container" id="loadMoreContainer" style="display: none;">
            <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
        </div>

        <!-- 无结果提示 -->
        <div id="noResults" class="no-results" style="display: none;">
            <div class="no-results-content">
                <span class="no-results-icon">😕</span>
                <h3>没有找到匹配的工具</h3>
                <p>试试调整筛选条件或搜索关键词</p>
                <button id="resetFilters" class="reset-btn">重置筛选</button>
            </div>
        </div>
    </main>

    <!-- 工具详情弹窗 -->
    <div id="toolModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容动态加载 -->
            </div>
        </div>
    </div>

    <!-- 收藏列表弹窗 -->
    <div id="favoritesModal" class="modal">
        <div class="modal-content favorites-modal">
            <button class="modal-close" id="favoritesModalClose">&times;</button>
            <h2>⭐ 我的收藏</h2>
            <div id="favoritesList" class="favorites-list">
                <!-- 收藏列表动态加载 -->
            </div>
        </div>
    </div>

    <!-- 提交工具弹窗 -->
    <div id="submitModal" class="modal">
        <div class="modal-content submit-modal">
            <button class="modal-close" id="submitModalClose">&times;</button>
            <h2>📝 提交新工具</h2>
            <form id="submitForm" class="submit-form">
                <div class="form-group">
                    <label for="submitName">工具名称 *</label>
                    <input type="text" id="submitName" required>
                </div>
                <div class="form-group">
                    <label for="submitUrl">官网链接 *</label>
                    <input type="url" id="submitUrl" required>
                </div>
                <div class="form-group">
                    <label for="submitDesc">描述 *</label>
                    <textarea id="submitDesc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="submitCategory">分类 *</label>
                    <select id="submitCategory" required></select>
                </div>
                <div class="form-group">
                    <label for="submitPricing">价格模式 *</label>
                    <select id="submitPricing" required>
                        <option value="免费">免费</option>
                        <option value="付费">付费</option>
                        <option value="免费 + 付费">免费 + 付费</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">提交到 GitHub Issues</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于</h4>
                    <p>收录 50+ 优质 AI 工具，帮助开发者、创作者和企业发现最好的 AI 工具</p>
                </div>
                <div class="footer-section">
                    <h4>链接</h4>
                    <a href="https://github.com/earyantLe/ai-tools-directory" target="_blank">GitHub 仓库</a>
                    <a href="#" id="submitToolLink">提交工具</a>
                </div>
                <div class="footer-section">
                    <h4>更新</h4>
                    <p id="lastUpdate">最后更新：2026-03-18</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>💡 持续更新中 | 数据来源：网络公开资源 | Made with ❤️</p>
            </div>
        </div>
    </footer>

    <script src="data.json"></script>
    <script src="script.js"></script>
</body>
</html>
